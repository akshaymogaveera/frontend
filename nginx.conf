server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security Headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # CSP Header - connect-src must include the backend domain
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://sqip-production.up.railway.app https://sqipqueue.com https://www.sqipqueue.com; frame-ancestors 'none';" always;

  # Proxy /api/ to the Django backend.
  # Handles the case where REACT_APP_API_BASE is not baked in at build time
  # so relative /api/ paths reach Django instead of serving index.html.
  location /api/ {
    proxy_pass https://sqip-production.up.railway.app/api/;
    proxy_set_header Host sqip-production.up.railway.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  location /healthz/ {
    proxy_pass https://sqip-production.up.railway.app/healthz/;
    proxy_set_header Host sqip-production.up.railway.app;
    proxy_ssl_server_name on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively
  location ~* \.(?:css|js|json|svg|ttf|woff|woff2|eot|png|jpg|jpeg|gif)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;
}
